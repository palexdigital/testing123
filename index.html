<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>paléX Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #421881;
    }

    .px-root {
      min-height: 100vh;
      width: 100%;
      background: #421881;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      padding: 3rem 2rem;
    }

    /* Glow */
    .px-bg-glow {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(137,107,181,0.22) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }

    /* Stars canvas */
    #starsCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* 3D X */
    .px-x-wrap {
      width: 100px;
      height: 100px;
      perspective: 500px;
      position: relative;
      z-index: 2;
      margin-bottom: 0.8rem;
    }

    .px-x-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spinX 7s linear infinite;
    }

    @keyframes spinX {
      from { transform: rotateY(0deg) rotateX(18deg); }
      to   { transform: rotateY(360deg) rotateX(18deg); }
    }

    .px-x-face {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: visible;
    }

    .px-x-face.front { transform: translateZ(10px); }
    .px-x-face.back  { transform: rotateY(180deg) translateZ(10px); }
    .px-x-face.left  { transform: rotateY(-90deg) translateZ(10px); }
    .px-x-face.right { transform: rotateY(90deg)  translateZ(10px); }

    .px-x-face .xletter {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 900;
      font-size: 64px;
      line-height: 1;
      user-select: none;
    }

    .px-x-face.front .xletter { color: #d4baff; }
    .px-x-face.back  .xletter { color: #7a55b0; }
    .px-x-face.left  .xletter { color: #9a76cc; font-size: 28px; }
    .px-x-face.right .xletter { color: #9a76cc; font-size: 28px; }

    /* Subtitle */
    .px-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: rgba(180, 150, 220, 0.65);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      margin: 0 0 0.5rem;
    }

    /* Title */
    .px-title {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: #000000;
      text-align: center;
      letter-spacing: -0.02em;
      line-height: 1.15;
      position: relative;
      z-index: 2;
      margin: 0 0 2.4rem;
      text-shadow: 0 2px 16px rgba(255,255,255,0.2);
    }

    /* Button wrapper */
    .px-btn-wrap {
      position: relative;
      z-index: 10;
    }

    /* Button */
    .btn {
      display: inline-block;
      cursor: pointer;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      border-radius: 100px;
      background: #000000;
      padding: 0;
      box-shadow:
        -0.15em -0.15em 0.15em -0.075em rgba(0,0,0,0.35),
         0.04em  0.04em  0.07em  0      rgba(0,0,0,0.2),
         0 0.05em 0.05em -0.01em rgba(0,0,0,1),
         0.15em 0.3em 0.1em -0.01em rgba(0,0,0,0.35);
      transition: box-shadow 300ms ease, transform 250ms ease;
    }

    .btn:hover {
      box-shadow:
        0 0 0 0 rgba(0,0,0,1),
        0 0 0 0 rgba(0,0,0,0.5),
        0 0 0 0 rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.975);
    }

    .btn-inner {
      display: block;
      border-radius: 100px;
      padding: 0.9em 1.8em;
      background: linear-gradient(135deg, #1c1c1c 0%, #000000 100%);
      overflow: hidden;
      clip-path: inset(0 0 0 0 round 100px);
      transition: clip-path 250ms ease, box-shadow 300ms ease;
      box-shadow:
        inset -0.05em -0.05em 0.05em rgba(255,255,255,0.08),
        inset  0.025em 0.05em 0.1em  rgba(255,255,255,0.12),
        inset  0.12em  0.12em 0.12em rgba(255,255,255,0.06),
        inset -0.075em -0.25em 0.25em 0.1em rgba(255,255,255,0.04);
    }

    .btn:hover .btn-inner {
      clip-path: inset(1px 1px 1px 1px round 100px);
      box-shadow:
        inset 0.1em  0.15em 0.05em rgba(255,255,255,0.12),
        inset 0.25em 0.25em 0.2em  rgba(255,255,255,0.08),
        inset 0.12em 0.12em 0.12em rgba(255,255,255,0.06),
        inset -0.075em -0.12em 0.2em 0.1em rgba(255,255,255,0.04);
    }

    .btn-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #896bb5;
      user-select: none;
      transition: transform 250ms ease;
      position: relative;
      z-index: 1;
    }

    .btn:hover .btn-label {
      transform: scale(0.975);
    }

    /* Spark particles */
    .px-sparks {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 20;
    }

    .px-spark {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
    }

    /* Corner decoration */
    .px-corner {
      position: absolute;
      bottom: 24px;
      left: 32px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="px-root" id="pxRoot">

    <div class="px-bg-glow"></div>
    <canvas id="starsCanvas"></canvas>

    <!-- 3D Floating X -->
    <div class="px-x-wrap" aria-hidden="true">
      <div class="px-x-3d" id="x3d">
        <div class="px-x-face front"><span class="xletter">X</span></div>
        <div class="px-x-face back"><span class="xletter">X</span></div>
        <div class="px-x-face left"><span class="xletter">✦</span></div>
        <div class="px-x-face right"><span class="xletter">✦</span></div>
      </div>
    </div>

    <p class="px-subtitle">paléX Digital</p>
    <h1 class="px-title">Welcome To paléX Digital</h1>

    <!-- CAPTCHA -->
<div style="margin-bottom: 20px; position: relative; z-index: 10;">
  <div class="cf-turnstile"
       data-sitekey="YOUR_SITE_KEY"
       data-callback="turnstileVerified">
  </div>
</div>

<!-- Button -->
<div class="px-btn-wrap" id="btnWrap">
      <button class="btn" id="mainBtn" disabled
        style="opacity:0.5; cursor:not-allowed;"
        aria-label="Press me — opens paléX Digital link hub">
        <span class="btn-inner">
          <span class="btn-label">Press me</span>
        </span>
      </button>
      <div class="px-sparks" id="sparkContainer"></div>
    </div>

    <!-- Corner dot grid -->
    <svg class="px-corner" width="100" height="100" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="10" cy="10" r="2.5" fill="#896bb5"/>
      <circle cx="30" cy="10" r="2.5" fill="#896bb5"/>
      <circle cx="50" cy="10" r="2.5" fill="#896bb5"/>
      <circle cx="70" cy="10" r="2.5" fill="#896bb5"/>
      <circle cx="10" cy="30" r="2.5" fill="#896bb5"/>
      <circle cx="30" cy="30" r="2.5" fill="#896bb5"/>
      <circle cx="50" cy="30" r="2.5" fill="#896bb5"/>
      <circle cx="10" cy="50" r="2.5" fill="#896bb5"/>
      <circle cx="30" cy="50" r="2.5" fill="#896bb5"/>
      <circle cx="10" cy="70" r="2.5" fill="#896bb5"/>
    </svg>

  </div>

  <script>
  (function () {

    /* ── SHOOTING STARS ─────────────────────── */
    var canvas = document.getElementById('starsCanvas');
    var root   = document.getElementById('pxRoot');

    function resizeCanvas() {
      canvas.width  = root.offsetWidth  || window.innerWidth;
      canvas.height = root.offsetHeight || window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    var ctx = canvas.getContext('2d');
    var stars = [];
    var spawnTimer = 0;

    function Star(x, y, size) {
      this.x        = x;
      this.y        = y;
      this.size     = size;
      this.speedY   = 1.2 + Math.random() * 2.5;
      this.speedX   = (Math.random() - 0.5) * 0.8;
      this.opacity  = 0;
      this.fadeIn   = true;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.045;
      this.trail    = [];
      this.maxTrail = 7 + Math.floor(Math.random() * 6);
    }

    Star.prototype.update = function () {
      this.trail.unshift({ x: this.x, y: this.y });
      if (this.trail.length > this.maxTrail) this.trail.pop();
      this.y -= this.speedY;
      this.x += this.speedX;
      this.rotation += this.rotSpeed;
      if (this.fadeIn) {
        this.opacity += 0.045;
        if (this.opacity >= 0.85) this.fadeIn = false;
      } else {
        this.opacity -= 0.009;
      }
    };

    Star.prototype.dead = function () {
      return this.opacity <= 0 || this.y < -20;
    };

    function drawStar(cx, cy, size, rot, alpha) {
      if (size < 0.4) return;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#080808';
      ctx.beginPath();
      var spikes = 4, outerR = size, innerR = size * 0.42;
      for (var i = 0; i < spikes * 2; i++) {
        var angle = (i * Math.PI) / spikes - Math.PI / 2;
        var r = (i % 2 === 0) ? outerR : innerR;
        if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
        else         ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function spawnStar() {
      stars.push(new Star(
        Math.random() * canvas.width,
        canvas.height + 12,
        3 + Math.random() * 5
      ));
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      spawnTimer++;
      if (spawnTimer % 10 === 0) spawnStar();
      var alive = [];
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        s.update();
        if (!s.dead()) alive.push(s);
        for (var t = 0; t < s.trail.length; t++) {
          drawStar(
            s.trail[t].x, s.trail[t].y,
            s.size * (1 - t / s.trail.length) * 0.7,
            s.rotation,
            s.opacity * (1 - t / s.trail.length) * 0.35
          );
        }
        drawStar(s.x, s.y, s.size, s.rotation, s.opacity);
      }
      stars = alive;
      requestAnimationFrame(tick);
    }

    /* Seed some stars immediately */
    for (var i = 0; i < 9; i++) {
      var s = new Star(
        Math.random() * (root.offsetWidth  || 400),
        Math.random() * (root.offsetHeight || 500),
        3 + Math.random() * 5
      );
      s.opacity = 0.3 + Math.random() * 0.4;
      s.fadeIn  = false;
      stars.push(s);
    }

    tick();

    /* ── BUTTON SPARKS + NAVIGATION ─────────── */
    var btn       = document.getElementById('mainBtn');
    window.turnstilePassed = false;

window.turnstileVerified = function (token) {
  window.turnstilePassed = true;

  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.cursor = 'pointer';
};
    var container = document.getElementById('sparkContainer');
    var btnWrap   = document.getElementById('btnWrap');

    function burst(cx, cy, cb) {
      var colors = ['#896bb5','#c9a8ff','#ffffff','#d4baff','#6a3fa0'];
      for (var i = 0; i < 16; i++) {
        (function(idx) {
          var el    = document.createElement('div');
          el.className = 'px-spark';
          var angle = (idx / 16) * 2 * Math.PI + (Math.random() - 0.5) * 0.5;
          var dist  = 30 + Math.random() * 35;
          var tx    = Math.cos(angle) * dist;
          var ty    = Math.sin(angle) * dist;
          var size  = 3 + Math.random() * 5;
          var dur   = 300 + Math.random() * 300;
          var delay = 80 + Math.random() * 120;
          el.style.cssText = [
            'left:' + cx + 'px',
            'top:'  + cy + 'px',
            'width:'  + size + 'px',
            'height:' + size + 'px',
            'background:' + colors[Math.floor(Math.random() * colors.length)],
            'opacity:1',
            'transition:transform ' + dur + 'ms cubic-bezier(0.2,0,1,1),' +
              'opacity ' + dur + 'ms ease ' + delay + 'ms'
          ].join(';');
          container.appendChild(el);
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              el.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(0)';
              el.style.opacity   = '0';
            });
          });
          setTimeout(function() { el.parentNode && el.parentNode.removeChild(el); }, 700);
        })(i);
      }
      if (cb) setTimeout(cb, 440);
    }

    btn.addEventListener('click', function () {

  if (!window.turnstilePassed) {
    alert("Please complete the verification first.");
    return;
  }
      var bRect = btn.getBoundingClientRect();
      var wRect = btnWrap.getBoundingClientRect();
      var cx = bRect.left - wRect.left + bRect.width  / 2;
      var cy = bRect.top  - wRect.top  + bRect.height / 2;
      burst(cx, cy, function () {
        window.location.href = 'https://palexdigital.github.io/paleXlinkhub/';
      });
    });

    btn.addEventListener('mousemove', function (e) {
      if (Math.random() > 0.88) {
        var wRect = btnWrap.getBoundingClientRect();
        var x = e.clientX - wRect.left;
        var y = e.clientY - wRect.top;
        var el = document.createElement('div');
        el.className = 'px-spark';
        el.style.cssText = [
          'left:' + x + 'px',
          'top:'  + y + 'px',
          'width:3px','height:3px',
          'background:#896bb5',
          'opacity:0.8',
          'transition:transform 380ms ease,opacity 380ms ease'
        ].join(';');
        container.appendChild(el);
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            el.style.transform = 'translate(' + ((Math.random()-0.5)*20) + 'px,' + (-10 - Math.random()*14) + 'px) scale(0)';
            el.style.opacity = '0';
          });
        });
        setTimeout(function() { el.parentNode && el.parentNode.removeChild(el); }, 480);
      }
    });

  })();
  </script>

</body>
</html>
