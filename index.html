  <script>
    // Year
    document.getElementById("year").textContent = new Date().getFullYear();

    // Shooting Stars
    function createStar() {
      const star = document.createElement("div");
      star.className = "star";

      // Random start position anywhere on screen
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";

      // Random angle: pick a direction in degrees, convert to dx/dy
      const angle = Math.random() * 360;
      const dist = Math.random() * 400 + 150;
      const rad = (angle * Math.PI) / 180;
      star.style.setProperty("--dx", Math.cos(rad) * dist + "px");
      star.style.setProperty("--dy", Math.sin(rad) * dist + "px");

      // Rotate the star element to match travel direction
      star.style.transform = "rotate(" + angle + "deg)";

      const duration = Math.random() * 1.5 + 0.5;
      star.style.animationDuration = duration + "s";

      document.body.appendChild(star);
      setTimeout(() => star.remove(), (duration + 0.1) * 1000);
    }

    setInterval(createStar, 250);
  </script>
