<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="paléXAppStore — All your paléX Apps in one place.">
  <title>Official paléX App Store | App Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; background: #3a3540; }

    #silk-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: block; }

    .page {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 20px 40px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.9s ease both; }

    /* ── Header ── */
    .profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }

    .logo-ring {
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(80,70,90,0.45); border: 2px solid rgba(180,140,255,0.3);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .x-glow { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
    .x-svg  { width: 90px; height: 90px; position: relative; z-index: 2; }

    .business-name { font-size: 26px; font-weight: 700; color: #7c3aed; letter-spacing: 0.4px; margin-bottom: 6px; text-align: center; }
    .tagline       { font-size: 14px; color: rgba(220,210,240,0.75); text-align: center; }

    /* ── Glass Grid ── */
    .links {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; width: 100%; max-width: 480px; margin-bottom: 44px;
    }

    .link-btn {
      position: relative; border-radius: 20px; overflow: hidden; cursor: pointer;
      text-decoration: none; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px 10px 14px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(180,140,255,0.25);
      transition: transform 0.2s ease, background 0.2s ease; min-height: 120px;
    }
    .link-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0.02) 100%);
      pointer-events: none;
    }
    .link-btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.14); }

    .card-img-wrap {
      width: 52px; height: 52px; border-radius: 14px; overflow: hidden;
      margin-bottom: 10px; background: rgba(120,80,200,0.3);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(180,140,255,0.2); flex-shrink: 0;
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .card-img-wrap img.loaded { display: block; }
    .card-img-wrap img.loaded + .default-icon { display: none; }
    .default-icon { font-size: 26px; color: rgba(200,170,255,0.9); display: flex; align-items: center; justify-content: center; line-height: 1; }
    .card-label { font-size: 12px; font-weight: 600; color: rgba(220,200,255,0.9); text-align: center; letter-spacing: 0.3px; position: relative; z-index: 1; }

    .edit-btn {
      position: absolute; top: 7px; right: 7px; width: 24px; height: 24px;
      border-radius: 50%; background: rgba(120,80,200,0.85); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s ease; z-index: 10;
    }
    .link-btn:hover .edit-btn { opacity: 1; }
    .edit-btn i { font-size: 12px; color: #fff; line-height: 1; }

    /* ── Footer ── */
    .footer { font-size: 12px; color: rgba(180,160,220,0.5); text-align: center; }

    /* ── Modal ── */
    .edit-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      align-items: center; justify-content: center;
      background: rgba(10,5,20,0.75); backdrop-filter: blur(4px);
    }
    .edit-modal.open { display: flex; }

    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-box {
      background: #1e1528; border: 1px solid rgba(180,140,255,0.35);
      border-radius: 20px; padding: 28px; width: 320px; max-width: 90vw;
      animation: modalIn 0.2s ease both;
    }
    .modal-box h3 { font-size: 16px; font-weight: 600; color: #c4a0ff; margin-bottom: 18px; }
    .modal-box label { font-size: 12px; color: rgba(180,160,220,0.7); display: block; margin-bottom: 5px; margin-top: 13px; }
    .modal-box label:first-of-type { margin-top: 0; }
    .modal-box input {
      width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(180,140,255,0.25);
      border-radius: 10px; padding: 9px 12px; color: #e0d0ff;
      font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .modal-box input:focus { border-color: rgba(140,90,255,0.7); }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-save {
      flex: 1; background: #7c3aed; color: #fff; border: none; border-radius: 10px;
      padding: 10px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: #6d28d9; }
    .btn-cancel {
      flex: 1; background: rgba(255,255,255,0.07); color: rgba(220,200,255,0.8);
      border: 1px solid rgba(180,140,255,0.2); border-radius: 10px; padding: 10px;
      font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.12); }

    @media (max-width: 400px) {
      .links { grid-template-columns: repeat(2, 1fr); max-width: 300px; }
      .business-name { font-size: 20px; }
    }
  </style>
</head>
<body>

  <canvas id="silk-canvas"></canvas>

  <main class="page fade-in">
    <header class="profile">
      <div class="logo-ring" id="logoRing">
        <div class="x-glow" id="xGlow"></div>
        <svg class="x-svg" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="gf" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
              <feComponentTransfer in="blur" result="glow">
                <feFuncA type="linear" slope="1.4"/>
              </feComponentTransfer>
              <feMerge>
                <feMergeNode in="glow"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="xgrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#6d28d9"/>
            </linearGradient>
          </defs>
          <g filter="url(#gf)">
            <line x1="14" y1="14" x2="76" y2="76" stroke="url(#xgrad)" stroke-width="14" stroke-linecap="round"/>
            <line x1="76" y1="14" x2="14" y2="76" stroke="url(#xgrad)" stroke-width="14" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <h1 class="business-name">Official paléX App Store</h1>
      <p class="tagline">Where Great Apps Find Their Audience.</p>
    </header>

    <nav class="links" id="links" aria-label="App links"></nav>

    <footer class="footer">
      <p>&copy; <span id="year"></span> paléX. All rights reserved.</p>
    </footer>
  </main>

  <!-- Edit Modal -->
  <div class="edit-modal" id="editModal" role="dialog" aria-modal="true" aria-label="Edit App">
    <div class="modal-box">
      <h3>Edit App</h3>
      <label for="editLabel">App Name</label>
      <input type="text" id="editLabel" placeholder="App name"/>
      <label for="editImg">Image URL (icon)</label>
      <input type="text" id="editImg" placeholder="https://..."/>
      <label for="editLink">Link URL</label>
      <input type="text" id="editLink" placeholder="https://..."/>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save"   id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <script>
    'use strict';

    /* ── App data — edit these to set your real links ── */
    const apps = [
      { label: 'Files',   icon: 'ti-file',      img: '', link: 'https://000000000000000/#' },
      { label: 'Books',   icon: 'ti-book',      img: '', link: 'https://000000000000000/'  },
      { label: 'Health',  icon: 'ti-heart',     img: '', link: 'https://000000000000000/'  },
      { label: 'Weather', icon: 'ti-cloud',     img: '', link: 'https://000000000000000/'  },
      { label: 'Notes',   icon: 'ti-edit',      img: '', link: 'https://000000000000000/'  },
      { label: 'Stats',   icon: 'ti-chart-bar', img: '', link: 'https://000000000000000/'  },
    ];

    /* ── Footer year ── */
    document.getElementById('year').textContent = new Date().getFullYear();

    /* ── Render grid ── */
    let editIdx = -1;

    function renderGrid() {
      const nav = document.getElementById('links');
      nav.innerHTML = '';
      apps.forEach((app, i) => {
        const a = document.createElement('a');
        a.className = 'link-btn';
        a.href = app.link || '#';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.setAttribute('aria-label', app.label);
        a.innerHTML = `
          <button class="edit-btn" data-i="${i}" title="Edit ${app.label}" aria-label="Edit ${app.label}">
            <i class="ti ti-pencil" aria-hidden="true"></i>
          </button>
          <div class="card-img-wrap">
            <img src="${app.img || ''}" alt="${app.label}" ${app.img ? '' : 'style="display:none"'}>
            <span class="default-icon" aria-hidden="true"><i class="ti ${app.icon}"></i></span>
          </div>
          <span class="card-label">${app.label}</span>
        `;
        const img = a.querySelector('img');
        if (img && app.img) {
          img.addEventListener('load',  () => img.classList.add('loaded'));
          img.addEventListener('error', () => img.style.display = 'none');
        }
        nav.appendChild(a);
      });

      nav.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          editIdx = parseInt(btn.dataset.i, 10);
          document.getElementById('editLabel').value = apps[editIdx].label;
          document.getElementById('editImg').value   = apps[editIdx].img;
          document.getElementById('editLink').value  = apps[editIdx].link;
          openModal();
        });
      });
    }

    renderGrid();

    /* ── Modal ── */
    function openModal()  { document.getElementById('editModal').classList.add('open'); }
    function closeModal() { document.getElementById('editModal').classList.remove('open'); }

    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('editModal').addEventListener('click', e => {
      if (e.target === document.getElementById('editModal')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    document.getElementById('saveBtn').addEventListener('click', () => {
      if (editIdx < 0) return;
      apps[editIdx].label = document.getElementById('editLabel').value.trim() || apps[editIdx].label;
      apps[editIdx].img   = document.getElementById('editImg').value.trim();
      apps[editIdx].link  = document.getElementById('editLink').value.trim() || '#';
      closeModal();
      renderGrid();
    });

    /* ── Silk background ── */
    (function initSilk() {
      const canvas = document.getElementById('silk-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, t = 0;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      function wait(cb) {
        if (typeof SimplexNoise !== 'undefined') cb();
        else setTimeout(() => wait(cb), 50);
      }

      wait(() => {
        const simplex = new SimplexNoise();
        function draw() {
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = '#3a3540';
          ctx.fillRect(0, 0, W, H);
          const lines = 90;
          for (let i = 0; i < lines; i++) {
            const y0 = (i / lines) * H;
            ctx.beginPath();
            ctx.moveTo(0, y0);
            const segs = 70;
            for (let j = 1; j <= segs; j++) {
              const x  = (j / segs) * W;
              const nx = simplex.noise3D(x * 0.003, y0 * 0.003, t * 0.008) * 60;
              const ny = simplex.noise3D(x * 0.003 + 100, y0 * 0.003, t * 0.008) * 18;
              ctx.lineTo(x + nx, y0 + ny);
            }
            const hue   = 270 + simplex.noise3D(i * 0.12, 0, t * 0.005) * 30;
            const alpha = 0.04 + Math.abs(simplex.noise3D(i * 0.15, 1, t * 0.004)) * 0.08;
            ctx.strokeStyle = `hsla(${hue},50%,65%,${alpha})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
          t++;
          requestAnimationFrame(draw);
        }
        draw();
      });
    }());

    /* ── Pulsing X glow ── */
    (function initXGlow() {
      const ring = document.getElementById('logoRing');
      const glow = document.getElementById('xGlow');
      let gt = 0;
      function pulse() {
        gt += 0.025;
        const k = 0.5 + 0.5 * Math.sin(gt);
        glow.style.background = `radial-gradient(circle,rgba(140,60,255,${(0.15+k*0.35).toFixed(3)}) 0%,rgba(100,30,200,${(0.05+k*0.10).toFixed(3)}) 60%,transparent 80%)`;
        ring.style.boxShadow  = `0 0 ${Math.round(20+k*40)}px rgba(130,50,255,${(0.20+k*0.35).toFixed(3)}),inset 0 0 ${Math.round(10+k*20)}px rgba(160,80,255,${(0.05+k*0.10).toFixed(3)})`;
        requestAnimationFrame(pulse);
      }
      pulse();
    }());
  </script>
</body>
</html>
