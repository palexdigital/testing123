<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Your Next Store</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .product-detail { max-width: var(--max-w); margin: 48px auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .product-detail-img { background: var(--color-surface); border-radius: var(--radius-card); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .product-detail-img img { width: 80%; object-fit: contain; }
    .product-detail-info { display: flex; flex-direction: column; gap: 20px; }
    .detail-breadcrumb { font-size: 0.8rem; color: var(--color-muted); }
    .detail-breadcrumb a { color: var(--color-muted); }
    .detail-breadcrumb a:hover { color: var(--color-text); }
    .detail-name { font-size: 1.75rem; font-weight: 700; line-height: 1.2; }
    .detail-price { font-size: 1.2rem; color: var(--color-muted); }
    .detail-divider { border: none; border-top: 1px solid var(--color-border); }
    .detail-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-swatches { display: flex; gap: 10px; }
    .detail-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
    .detail-swatch.active, .detail-swatch:hover { border-color: var(--color-dark); }
    .size-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .size-btn { border: 1px solid var(--color-border); border-radius: 4px; padding: 8px 16px; font-size: 0.8125rem; font-family: inherit; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .size-btn:hover, .size-btn.active { border-color: var(--color-dark); background: var(--color-dark); color: #fff; }
    .add-btn { padding: 15px; font-size: 0.9rem; }
    .detail-desc { font-size: 0.875rem; color: var(--color-muted); line-height: 1.7; }
    @media (max-width: 720px) { .product-detail { grid-template-columns: 1fr; gap: 28px; padding: 0 16px; margin: 24px auto; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">Your Next Store</a>
    <nav class="nav-links">
      <a href="category.html?cat=accessories">Accessories</a>
      <a href="category.html?cat=apparel">Apparel</a>
      <a href="category.html?cat=shoes">Shoes</a>
    </nav>
    <div class="nav-actions">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search for products..." />
        <button class="search-btn" onclick="window.location='index.html#products'" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
      <button class="icon-btn" aria-label="Account">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn cart-btn" aria-label="Cart" onclick="toggleCart()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- PRODUCT DETAIL -->
  <div class="product-detail" id="productDetail">
    <!-- Injected by JS -->
  </div>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button onclick="toggleCart()" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="btn-dark full-width" onclick="checkout()">Checkout</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    function formatPrice(n) {
      if (Array.isArray(n)) return `$${n[0].toFixed(2)} – $${n[1].toFixed(2)}`;
      return "$" + n.toFixed(2);
    }

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get("id"));
    const product = PRODUCTS.find(p => p.id === id);

    const container = document.getElementById("productDetail");

    if (!product) {
      container.innerHTML = `<p style="color:var(--color-muted);padding:48px">Product not found. <a href="index.html">Back to shop</a></p>`;
    } else {
      document.title = `${product.name} — Your Next Store`;

      const categoryLabel = product.category.charAt(0).toUpperCase() + product.category.slice(1);
      const swatchHTML = product.colors && product.colors.length
        ? `<div>
             <p class="detail-label">Color</p>
             <div class="detail-swatches">
               ${product.colors.map((c, i) => `<span class="detail-swatch ${i===0?'active':''}" style="background:${c}" onclick="selectSwatch(this)"></span>`).join("")}
             </div>
           </div>`
        : "";

      container.innerHTML = `
        <div class="product-detail-img">
          <img src="${product.image}" alt="${product.name}" onerror="this.src='images/placeholder.svg'" />
        </div>
        <div class="product-detail-info">
          <p class="detail-breadcrumb">
            <a href="index.html">Home</a> /
            <a href="category.html?cat=${product.category}">${categoryLabel}</a> /
            ${product.name}
          </p>
          <h1 class="detail-name">${product.name}</h1>
          <p class="detail-price">${formatPrice(product.price)}</p>
          <hr class="detail-divider" />
          ${swatchHTML}
          <div>
            <p class="detail-label">Size</p>
            <div class="size-grid">
              ${["XS","S","M","L","XL"].map(s => `<button class="size-btn" onclick="selectSize(this)">${s}</button>`).join("")}
            </div>
          </div>
          <hr class="detail-divider" />
          <button class="btn-dark add-btn" onclick="addToCart(${product.id}); toggleCart();">Add to Cart</button>
          <p class="detail-desc">
            Premium quality ${product.name.toLowerCase()} crafted with attention to detail.
            Free shipping on orders over $150. Easy 30-day returns.
          </p>
        </div>
      `;
    }

    function selectSwatch(el) {
      document.querySelectorAll(".detail-swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
    }
    function selectSize(el) {
      document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
      el.classList.add("active");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 3000);
    }
  </script>
</body>
</html>
