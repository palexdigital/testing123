<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — Your Next Store</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .category-header { padding: 40px 40px 0; max-width: var(--max-w); margin: 0 auto; }
    .category-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
    .category-header p  { font-size: 0.875rem; color: var(--color-muted); }
    .cat-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--color-border); padding: 0 40px; max-width: var(--max-w); margin: 0 auto; }
    .cat-tab { padding: 14px 20px; font-size: 0.875rem; font-family: inherit; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: border-color 0.15s; color: var(--color-muted); }
    .cat-tab.active { border-bottom-color: var(--color-dark); color: var(--color-text); font-weight: 500; }
    .cat-tab:hover { color: var(--color-text); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">Your Next Store</a>
    <nav class="nav-links">
      <a href="category.html?cat=accessories">Accessories</a>
      <a href="category.html?cat=apparel">Apparel</a>
      <a href="category.html?cat=shoes">Shoes</a>
    </nav>
    <div class="nav-actions">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search for products..." onkeydown="if(event.key==='Enter') renderPage()" />
        <button class="search-btn" onclick="renderPage()" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
      <button class="icon-btn" aria-label="Account">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn cart-btn" aria-label="Cart" onclick="toggleCart()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- CATEGORY HEADER -->
  <div class="category-header">
    <h1 id="catTitle">All Products</h1>
    <p id="catCount"></p>
  </div>

  <!-- TABS -->
  <div class="cat-tabs">
    <button class="cat-tab" data-cat="all"          onclick="switchTab(this)">All</button>
    <button class="cat-tab" data-cat="accessories"  onclick="switchTab(this)">Accessories</button>
    <button class="cat-tab" data-cat="apparel"      onclick="switchTab(this)">Apparel</button>
    <button class="cat-tab" data-cat="shoes"        onclick="switchTab(this)">Shoes</button>
  </div>

  <!-- GRID -->
  <section class="products-section">
    <div class="sort-wrap">
      <select id="sortSelect" onchange="renderPage()">
        <option value="default">Sort products</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
      </select>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </section>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button onclick="toggleCart()" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="btn-dark full-width" onclick="checkout()">Checkout</button>
    </div>
  </aside>
  <div class="toast" id="toast"></div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    let activeCat = new URLSearchParams(location.search).get("cat") || "all";

    function formatPrice(n) {
      if (Array.isArray(n)) return `$${n[0].toFixed(2)} – $${n[1].toFixed(2)}`;
      return "$" + n.toFixed(2);
    }

    function switchTab(el) {
      document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      activeCat = el.dataset.cat;
      history.replaceState(null,"", `category.html?cat=${activeCat}`);
      renderPage();
    }

    function renderPage() {
      const query = (document.getElementById("searchInput")?.value || "").toLowerCase();
      const sort  = document.getElementById("sortSelect")?.value || "default";

      let list = PRODUCTS.filter(p => {
        const catOk = activeCat === "all" || p.category === activeCat;
        const qOk   = !query || p.name.toLowerCase().includes(query);
        return catOk && qOk;
      });

      if (sort === "price-asc")  list.sort((a,b) => min(a)-min(b));
      if (sort === "price-desc") list.sort((a,b) => min(b)-min(a));
      if (sort === "name-asc")   list.sort((a,b) => a.name.localeCompare(b.name));

      const label = activeCat === "all" ? "All Products" : activeCat.charAt(0).toUpperCase() + activeCat.slice(1);
      document.getElementById("catTitle").textContent = label;
      document.getElementById("catCount").textContent = `${list.length} product${list.length !== 1 ? "s" : ""}`;
      document.title = `${label} — Your Next Store`;

      const grid = document.getElementById("productGrid");
      if (!list.length) { grid.innerHTML = `<p class="no-results">No products found.</p>`; return; }

      grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="product-img-wrap">
            <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='images/placeholder.svg'" />
            <button class="quick-add" onclick="event.stopPropagation();addToCart(${p.id})">Add to cart</button>
          </div>
          ${p.colors?.length ? `<div class="color-swatches">${p.colors.map(c=>`<span class="swatch" style="background:${c}"></span>`).join("")}</div>` : ""}
          <div class="product-info">
            <p class="product-name">${p.name}</p>
            <p class="product-price">${formatPrice(p.price)}</p>
          </div>
        </div>
      `).join("");
    }

    function min(p) { return Array.isArray(p.price) ? p.price[0] : p.price; }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 3000);
    }

    // Set active tab from URL
    document.addEventListener("DOMContentLoaded", () => {
      const tab = document.querySelector(`.cat-tab[data-cat="${activeCat}"]`)
                  || document.querySelector('.cat-tab[data-cat="all"]');
      tab?.classList.add("active");
      renderPage();
    });
  </script>
</body>
</html>
